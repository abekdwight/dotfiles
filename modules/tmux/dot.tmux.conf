# tmux custom settings
set-option -g display-time 4000
set-option -g default-command $SHELL

# change tmux-prefix C-b => C-q
set -g prefix C-q
unbind C-b

#
# [ basic settings ]
#
set -g mouse on
set -g default-terminal xterm-256color
set -g terminal-overrides 'xterm:colors=256'

# ウィンドウ名は手動で管理する
set-option -g allow-rename off
set-option -wg automatic-rename off
bind r command-prompt -I "#W" "rename-window '%%'"

# ペイン名を上部ボーダーに表示し、Prefix + e で変更する
set -g pane-border-status top
set -g pane-border-format '#{?pane_active,#[bold],}#{pane_index}: #{pane_title}'
bind-key e command-prompt -p "Pane name:" "select-pane -T '%%'"

#
# [ status line ]
#
set-option -g status-position bottom
set-option -g status-justify left
set-option -g status-interval 1
set-option -g status-fg "colour0"
set-option -g status-right-length 500
set-option -g window-status-format " #I:#W "
set-option -g window-status-current-format " #[reverse]#I:#W#[noreverse] "
# 通知(ベル/アクティビティ)時の色
set -g window-status-bell-style "fg=colour0,bg=colour13,bold"

# 左側のstatus line を変更
set-option -g status-right "#{ccusage_today_cost} #{ccusage_today_tokens} | #[fg=colour238,bg=colour235] #[default]#[fg=colour255,bg=colour238] #{pane_current_path} #[default]#[fg=colour235,bg=colour238] #[default]#[fg=colour255,bg=colour235] %m/%d %H:%M:%S #[default]"

## vimでnomalモードに戻るときにもたつくのを防ぐ
set -g escape-time 100
# set -g lock-after-time 900
# set -g lock-command "cmatrix"
set -g history-limit 999999999
set -g @jump-key 'j'

bind-key C-g display-panes
set -g display-panes-time 15000

# new pain and window on current directory
bind c new-window -c '#{pane_current_path}'
bind '"' split-window -c '#{pane_current_path}'
bind % split-window -h -c '#{pane_current_path}'

set-option -g base-index 1
set-option -g renumber-windows on

bind -n WheelUpPane if-shell -F -t = "#{mouse_any_flag}" "send-keys -M" "if -Ft= '#{pane_in_mode}' 'send-keys -M' 'copy-mode -e'"

# コピーモードでvimキーバインドを使う
setw -g mode-keys vi
bind-key -T copy-mode-vi v     send-keys -X begin-selection
bind-key -T copy-mode-vi y     send-keys -X copy-pipe "reattach-to-user-namespace pbcopy"
unbind -T copy-mode-vi Enter
bind-key -T copy-mode-vi Enter send-keys -X copy-pipe-and-cancel "reattach-to-user-namespace pbcopy"

# ']' でpbpasteを使う
bind ] run "reattach-to-user-namespace pbpaste | tmux load-buffer - && tmux paste-buffer"

# plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-open'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-urlview'
set -g @plugin '~/.tmux/plugins/tmux-open-md'
set -g @plugin 'schasse/tmux-jump'
set -g @plugin 'yanskun/tmux-ccusage'

# reload tmux => tmux source ~/.tmux.conf
run -b '~/.tmux/plugins/tpm/tpm'
